# Required metadata
sonar.projectKey=my-python-project
sonar.projectName=My Python Project
sonar.projectVersion=1.0

# Path to the source code directory (relative to project root)
sonar.sources=.

# Language
sonar.language=py

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Optional: Python specific properties for coverage reports
# You need to generate the coverage.xml file using a tool like coverage.py first
# sonar.python.coverage.reportPaths=xmlcov.xml
